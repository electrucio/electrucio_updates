01 IRB=0.031 RE=0.0832 RC=0.01 CJE=2.92702E-10 VJE=0.67412 MJE=0.3300 \\n+ FC=0.5 CJC=4.8831E-11 VJC=0.5258 MJC=0.3928 XCJC=0.5287 XTB=1.1398 EG=1.2105 XTI=3.0)\\n.MODEL BD140 PNP(IS=1.408E-13 BF=163.6 NF=1.0 BR=42.79 NR=1.0 ISE=3.58E-14 \\n+ NE=1.5 ISC=4.093E-11 NC=1.45 VAF=64.2 VAR=100 IKF=1.077 IKR=0.2 RB=1.98 \\n+ RBM=0.001 IRB=0.024 RE=0.063 RC=0.01 CJE=3.045E-10 VJE=0.697 MJE=0.344 \\n+ FC=0.5 CJC=6.78E-11 VJC=0.526 MJC=0.404 XCJC=0.528 XTB=1.35 EG=1.21 XTI=3.0)\nTEXT 3712 3504 Left 2 !.MODEL 2SD896 NPN(IS=1e-11 BF=120 VAF=100 IKF=5 ISE=1e-11 NE=2 RB=2 RC=0.1 RE=0.05 CJC=340p CJE=1.5n TF=10.6n TR=1u ITF=2 VTF=10 XTF=1 VJC=0.75 MJC=0.33)\\n.MODEL 2SB776 PNP(IS=1e-11 BF=120 VAF=100 IKF=5 ISE=1e-11 NE=2 RB=2 RC=0.1 RE=0.05 CJC=480p CJE=2n TF=10.6n TR=1u ITF=2 VTF=10 XTF=1 VJC=0.75 MJC=0.33)\nTEXT 2896 1232 Left 2 !K1 L1 L2 L3 0.99\nTEXT 3712 1760 Left 2 !.model 1N4755A D(Is=1.0u Rs=70 Bv=43 Ibv=5.8m Cjo=100p type=Zener)\nTEXT 3720 1720 Left 2 !.model 1N5408 D(Is=63.0n Rs=14.1m Bv=1000 Ibv=10u Cjo=53p M=0.333 N=1.30 Eg=1.11)\nTEXT -1384 2336 Left 2 !.param treble=0.5\nTEXT -1384 2288 Left 2 !;.step param drive list 0 0.25 0.5 0.75 1.0\\n.param drive=0.0\nTEXT -1384 2368 Left 2 !.param bass=0.5\nTEXT -1384 2400 Left 2 !.param vol=1.0\nTEXT -1368 2952 Left 2 !.param in_amplitude = 0.1 ; 150 mVp = nuestro target P90\nTEXT -1368 2984 Left 2 !.param in_freq=1000\nTEXT -1384 2528 Left 2 !.options plotwinsize=0\nTEXT -1368 3096 Left 2 !.param t_start = 4000m\\n.param tran_window = 200m\\n.param t_stop = {t_start + tran_window}\\n.param step = 1 / {1000 * in_freq}\\n.tran {step} {t_stop} {t_start} {step}\nTEXT 6232 3296 Left 2 ;https://www.duncanamps.com/spice/loudspeakers/vint30.inc\nTEXT -1360 3384 Left 2 !* ====================================================================\\n* \ud83c\udfb8 COMPREHENSIVE GUITAR AMP DIAGNOSTICS (PREAMP & POWER AMP)\\n* Topology change: Q9 removed. Q11 is now a standalone emitter follower\\n* (TONE_OUT \u2192 C21 \u2192 Q11B; new bias divider 330k/110k; P3 master vol at output).\\n* ====================================================================\\n* --- 1. POWER SUPPLY RAILS & RIPPLE ---\\n* Checks if the filter caps (C13, etc.) are sufficiently sizing down the AC ripple.\\n.meas tran Vcc_mean AVG V(VCC)\\n.meas tran Vcc_max MAX V(VCC)\\n.meas tran Vcc_min MIN V(VCC)\\n.meas tran Vcc_ripple PARAM (Vcc_max-Vcc_min)\\n.meas tran Vraw_mean AVG V(N002)\\n.meas tran Vraw_max MAX V(N002)\\n.meas tran Vraw_min MIN V(N002)\\n.meas tran Vraw_ripple PARAM (Vraw_max-Vraw_min)\\n* --- 2. DC OPERATING POINTS (BIASING) ---\\n* Verifies transistors aren't saturated/cutoff. The script will use these to calculate Vbe and Vce.\\n* Preamp Transistors (Q8, Q10, Q11, Q12)   ; Q9 removed\\n.meas tran Vq12b_mean AVG V(Q12B)\\n.meas tran Vq12e_mean AVG V(Q12E)\\n.meas tran Vq10b_mean AVG V(Q10B)\\n.meas tran Vq10e_mean AVG V(Q10E)\\n.meas tran Vq8b_mean  AVG V(Q8B)\\n.meas tran Vq8e_mean  AVG V(Q8E)\\n.meas tran Vq11b_mean AVG V(Q11B)         ; target ~12.2 V (new divider)\\n.meas tran Vq11e_mean AVG V(Q11E)         ; target ~11.55 V (Vbe \u2248 0.65 V)\\n* Power Amp Transistors (Q1-Q7)\\n.meas tran Vq1b_mean AVG V(Q1B)\\n.meas tran Vq1e_mean AVG V(Q1E)\\n.meas tran Vq2b_mean AVG V(Q2B)\\n* Vq2e_mean removed: Q2 emitter is hardwired to GND (would always FAIL).\\n.meas tran Vq2c_mean AVG V(Q2C)\\n.meas tran Vq6b_mean AVG V(Q6B)\\n.meas tran Vq6c_mean AVG V(Q6C)           ; ADDED \u2014 needed by Vce_Q4 below\\n.meas tran Vq6e_mean AVG V(Q6E)\\n.meas tran Vq7b_mean AVG V(Q7B)\\n.meas tran Vq7c_mean AVG V(Q7C)\\n* --- 3. SIGNAL LEVELS & HEADROOM (MAX/MIN/RMS) ---\\n* Detects clipping limits. PRE_SPEAKER should center exactly at VCC/2.\\n.meas tran Vpickup_in_max MAX V(PICKUP_IN)\\n.meas tran Vpickup_in_min MIN V(PICKUP_IN)\\n.meas tran Vpickup_in_rms RMS V(PICKUP_IN)\\n.meas tran Vtone_in_max MAX V(TONE_IN)\\n.meas tran Vtone_in_min MIN V(TONE_IN)\\n.meas tran Vtone_in_rms RMS V(TONE_IN)\\n.meas tran Vtone_out_max MAX V(TONE_OUT)\\n.meas tran Vtone_out_min MIN V(TONE_OUT)\\n.meas tran Vtone_out_rms RMS V(TONE_OUT)\\n* NEW: Q11 buffer headroom monitoring (Q11 now sees full TONE_OUT swing)\\n.meas tran Vq11b_max MAX V(Q11B)\\n.meas tran Vq11b_min MIN V(Q11B)\\n.meas tran Vq11b_rms RMS V(Q11B)\\n.meas tran Vq11e_max MAX V(Q11E)\\n.meas tran Vq11e_min MIN V(Q11E)\\n.meas tran Vq11e_rms RMS V(Q11E)\\n.meas tran Vpreamp_out_max MAX V(PREAMP_OUT)\\n.meas tran Vpreamp_out_min MIN V(PREAMP_OUT)\\n.meas tran Vpreamp_out_rms RMS V(PREAMP_OUT)\\n.meas tran Vpre_speaker_max  MAX V(PRE_SPEAKER)\\n.meas tran Vpre_speaker_min  MIN V(PRE_SPEAKER)\\n.meas tran Vpre_speaker_mean AVG V(PRE_SPEAKER)\\n.meas tran Vpre_speaker_rms  RMS V(PRE_SPEAKER)\\n.meas tran Vspeaker_max MAX V(SPEAKER)\\n.meas tran Vspeaker_min MIN V(SPEAKER)\\n.meas tran Vspeaker_rms RMS V(SPEAKER)\\n* --- 4. GAIN STAGING ---\\n* Tracks the AC voltage multiplication at every block. Uses peak-to-peak to ignore DC offsets.\\n.meas tran Gain_Pre_Stage1 PARAM (Vtone_in_max-Vtone_in_min)/(Vpickup_in_max-Vpickup_in_min)\\n.meas tran ToneStack_Loss  PARAM (Vtone_out_max-Vtone_out_min)/(Vtone_in_max-Vtone_in_min)\\n* NEW: decomposed Stage 2 (was Q9+Q11+P3, now just Q11 follower + P3)\\n.meas tran Buffer_Gain_Q11 PARAM (Vq11e_max-Vq11e_min)/(Vq11b_max-Vq11b_min)   ; expect \u2248 0.99\\n.meas tran MasterVol_Atten PARAM (Vpreamp_out_max-Vpreamp_out_min)/(Vq11e_max-Vq11e_min)\\n* Aggregate kept for backward comparison with old logs:\\n.meas tran Gain_Pre_Stage2  PARAM (Vpreamp_out_max-Vpreamp_out_min)/(Vtone_out_max-Vtone_out_min)\\n.meas tran Gain_Total_Preamp PARAM (Vpreamp_out_max-Vpreamp_out_min)/(Vpickup_in_max-Vpickup_in_min)\\n.meas tran Gain_PowerAmp     PARAM (Vspeaker_max-Vspeaker_min)/(Vpreamp_out_max-Vpreamp_out_min)\\n.meas tran Gain_System_Total PARAM (Vspeaker_max-Vspeaker_min)/(Vpickup_in_max-Vpickup_in_min)\\n* --- 5. DISTORTION, SYMMETRY & RINGING ---\\n* .four checks for harmonic distortion. Excessive high-order harmonics often indicate parasitic oscillation/ringing.\\n* Symmetry variables >1.05 or <0.95 indicate asymmetric clipping.\\n.meas tran Clip_Sym_Preamp PARAM abs(Vpreamp_out_max/Vpreamp_out_min)\\n.meas tran Clip_Sym_Power  PARAM abs(Vspeaker_max/Vspeaker_min)\\n.four {in_freq} 15 10 V(PREAMP_OUT)\\n.four {in_freq} 15 10 V(PRE_SPEAKER)\\n.four {in_freq} 15 10 V(SPEAKER)\\n* Transient timing checks (Sharp spikes/ringing will disrupt these triggers, acting as a stability flag)\\n.meas tran Rise_Time TRIG V(SPEAKER)=0.1*Vspeaker_max RISE=1 TARG V(SPEAKER)=0.9*Vspeaker_max RISE=1\\n.meas tran Fall_Time TRIG V(SPEAKER)=0.9*Vspeaker_min FALL=1 TARG V(SPEAKER)=0.1*Vspeaker_min FALL=1\\n* --- 6. QUIESCENT CURRENTS & POWER DRAW ---\\n* Ensures the output stage bias isn't drifting into thermal runaway (Target: ~40mA per your schematic notes).\\n.meas tran I_Supply_mean AVG I(V2)\\n.meas tran Power_Total_W PARAM abs(I_Supply_mean*47)\\n.meas tran Iq6_bias AVG I(R16)\\n.meas tran Iq7_bias AVG I(R17)\\n.meas tran Output_Bias_mA PARAM abs(Iq6_bias)*1000\\n* --- 7. RIPPLE & AC MAINS INTRUSION (50Hz Base) ---\\n* Evaluates how much mains hum/ripple reaches the audio path\\n.four 50 10 2 V(N002)\\n.four 50 10 2 V(VCC)\\n.four 50 10 2 V(PREAMP_OUT)\\n.four 50 10 2 V(SPEAKER)\\n.meas tran Iq_R16_real AVG I(R16) FROM 100m TO 200m\\n.meas tran Iq_R17_real AVG I(R17) FROM 100m TO 200m\\n.meas tran Iq_through_output PARAM (abs(Iq_R16_real)+abs(Iq_R17_real))/2*1000\\n* Vbe / Vce sanity checks\\n.meas tran Vbe_Q6  PARAM Vq6b_mean - Vq6e_mean\\n.meas tran Vbe_Q7  PARAM Vq7b_mean                  ; FIXED: Q7 emitter is GND, so Vbe = V(Q7B)\\n.meas tran Vbe_Q11 PARAM Vq11b_mean - Vq11e_mean    ; ADDED: target \u2248 0.65 V\\n.meas tran Vce_Q4  PARAM Vq6c_mean - Vq6b_mean      ; now resolves (Vq6c_mean added in \u00a72)\\n.meas tran Vce_Q5  PARAM Vq7b_mean - Vq7c_mean\\n* Tone-stack diode clipper diagnostics\\n.meas tran Vtone_in_pk_pos MAX V(TONE_IN)\\n.meas tran Vtone_in_pk_neg MIN V(TONE_IN)\\n.meas tran diode_clip_pos PARAM (Vtone_in_pk_pos > 1.35)\\n.meas tran diode_clip_neg PARAM (Vtone_in_pk_neg < -1.95)\\n.meas tran Speaker_RMS_power AVG abs(V(SPEAKER)*I(R27))\nTEXT 4072 1136 Left 2 ;Note that Vcc is disconnected: will be used just for debug purposes, to simulate an ideal power supply unit.\n";

VG V(Q12E)\n.meas tran Vq10b_mean AVG V(Q10B)\n.meas tran Vq10e_mean AVG V(Q10E)\n.meas tran Vq8b_mean  AVG V(Q8B)\n.meas tran Vq8e_mean  AVG V(Q8E)\n.meas tran Vq11b_mean AVG V(Q11B)         ; target ~12.2 V (new divider)\n.meas tran Vq11e_mean AVG V(Q11E)         ; target ~11.55 V (Vbe \u2248 0.65 V)\n* Power Amp Transistors (Q1-Q7)\n.meas tran Vq1b_mean AVG V(Q1B)\n.meas tran Vq1e_mean AVG V(Q1E)\n.meas tran Vq2b_mean AVG V(Q2B)\n* Vq2e_mean removed: Q2 emitter is hardwired to GND (would always FAIL).\n.meas tran Vq2c_mean AVG V(Q2C)\n.meas tran Vq6b_mean AVG V(Q6B)\n.meas tran Vq6c_mean AVG V(Q6C)           ; ADDED \u2014 needed by Vce_Q4 below\n.meas tran Vq6e_mean AVG V(Q6E)\n.meas tran Vq7b_mean AVG V(Q7B)\n.meas tran Vq7c_mean AVG V(Q7C)\n* --- 3. SIGNAL LEVELS & HEADROOM (MAX/MIN/RMS) ---\n* Detects clipping limits. PRE_SPEAKER should center exactly at VCC/2.\n.meas tran Vpickup_in_max MAX V(PICKUP_IN)\n.meas tran Vpickup_in_min MIN V(PICKUP_IN)\n.meas tran Vpickup_in_rms RMS V(PICKUP_IN)\n.meas tran Vtone_in_max MAX V(TONE_IN)\n.meas tran Vtone_in_min MIN V(TONE_IN)\n.meas tran Vtone_in_rms RMS V(TONE_IN)\n.meas tran Vtone_out_max MAX V(TONE_OUT)\n.meas tran Vtone_out_min MIN V(TONE_OUT)\n.meas tran Vtone_out_rms RMS V(TONE_OUT)\n* NEW: Q11 buffer headroom monitoring (Q11 now sees full TONE_OUT swing)\n.meas tran Vq11b_max MAX V(Q11B)\n.meas tran Vq11b_min MIN V(Q11B)\n.meas tran Vq11b_rms RMS V(Q11B)\n.meas tran Vq11e_max MAX V(Q11E)\n.meas tran Vq11e_min MIN V(Q11E)\n.meas tran Vq11e_rms RMS V(Q11E)\n.meas tran Vpreamp_out_max MAX V(PREAMP_OUT)\n.meas tran Vpreamp_out_min MIN V(PREAMP_OUT)\n.meas tran Vpreamp_out_rms RMS V(PREAMP_OUT)\n.meas tran Vpre_speaker_max  MAX V(PRE_SPEAKER)\n.meas tran Vpre_speaker_min  MIN V(PRE_SPEAKER)\n.meas tran Vpre_speaker_mean AVG V(PRE_SPEAKER)\n.meas tran Vpre_speaker_rms  RMS V(PRE_SPEAKER)\n.meas tran Vspeaker_max MAX V(SPEAKER)\n.meas tran Vspeaker_min MIN V(SPEAKER)\n.meas tran Vspeaker_rms RMS V(SPEAKER)\n* --- 4. ran Power_Total_W PARAM abs(I_Supply_mean*47)\n.meas tran Iq6_bias AVG I(R16)\n.meas tran Iq7_bias AVG I(R17)\n.meas tran Output_Bias_mA PARAM abs(Iq6_bias)*1000\n* --- 7. RIPPLE & AC MAINS INTRUSION (50Hz Base) ---\n* Evaluates how much mains hum/ripple reaches the audio path\n.four 50 10 2 V(N002)\n.four 50 10 2 V(VCC)\n.four 50 10 2 V(PREAMP_OUT)\n.four 50 10 2 V(SPEAKER)\n.meas tran Iq_R16_real AVG I(R16) FROM 100m TO 200m\n.meas tran Iq_R17_real AVG I(R17) FROM 100m TO 200m\n.meas tran Iq_through_output PARAM (abs(Iq_R16_real)+abs(Iq_R17_real))/2*1000\n* Vbe / Vce sanity checks\n.meas tran Vbe_Q6  PARAM Vq6b_mean - Vq6e_mean\n.meas tran Vbe_Q7  PARAM Vq7b_mean                  ; FIXED: Q7 emitter is GND, so Vbe = V(Q7B)\n.meas tran Vbe_Q11 PARAM Vq11b_mean - Vq11e_mean    ; ADDED: target \u2248 0.65 V\n.meas tran Vce_Q4  PARAM Vq6c_mean - Vq6b_mean      ; now resolves (Vq6c_mean added in \u00a72)\n.meas tran Vce_Q5  PARAM Vq7b_mean - Vq7c_mean\n* Tone-stack diode clipper diagnostics\n.meas tran Vtone_in_pk_pos MAX V(TONE_IN)\n.meas tran Vtone_in_pk_neg MIN V(TONE_IN)\n.meas tran diode_clip_pos PARAM (Vtone_in_pk_pos > 1.35)\n.meas tran diode_clip_neg PARAM (Vtone_in_pk_neg < -1.95)\n.meas tran Speaker_RMS_power AVG abs(V(SPEAKER)*I(R27))\n* Note that Vcc is disconnected: will be used just for debug purposes, to simulate an ideal power supply unit.\n.lib linear_pot.sub\n.lib log_pot.sub\n.lib revlog_pot.sub\n.backanno\n.end\n";

/* ======================= shared helpers ======================= */
const FONT = [0.625,1,1.5,2,2.5,3.5,5,7];
const FONT_BASE = 9;
const css = name => getComputedStyle(document.body).getPropertyValue(name).trim();

function parseAsy(text){
  const s = {lines:[],rects:[],circles:[],arcs:[],texts:[],pins:[],windows:{},value:null,prefix:null};
  for(const raw of text.split(/\r?\n/)){
    const t = raw.trim().split(/\s+/);
    if(!t[0]) continue;
    const num = i=>parseInt(t[i],10);
    switch(t[0]){
      case "LINE":      s.lines.push([num(2),num(3),num(4),num(5),num(6)||0]); break;
      case "RECTANGLE": s.rects.push([num(2),num(3),num(4),num(5),num(6)||0]); break;
      case "CIRCLE":    s.circles.push([num(2),num(3),num(4),num(5),num(6)||0]); break;
      case "ARC":       s.arcs.push([num(2),num(3),num(4),num(5),num(6),num(7),num(8),num(9),num(10)||0]); break;
      case "PIN":       s.pins.push([num(1),num(2)]); break;
      case "WINDOW":    s.windows[t[1]] = {x:num(2),y:num(3),just:t[4],size:num(5)||2}; break;
      case "TEXT": {
        const m = raw.trim().match(/^TEXT\s+(-?\d+)\s+(-?\d+)\s+(\S+)\s+(\d+)\s+(.*)$/);
        if(m) s.texts.push({x:+m[1],y:+m[2],just:m[3],size:+m[4],str:m[5]});
        break;
      }
      case "SYMATTR":
        if(t[1]==="Value")  s.value  = t.slice(2).join(" ");
        if(t[1]==="Prefix") s.prefix = t.slice(2).join(" ");
        break;
    }
  }
  return s;
}
const parsedLib = {};
function lookupSym(name){
  const base = name.split(/[\\\/]/).pop().toLowerCase();
  if(parsedLib[base]) return parsedLib[base];
  const key = Object.keys(LIB).find(k=>k.toLowerCase()===base);
  return key ? (parsedLib[base] = parseAsy(LIB[key])) : null;
}

function parseAsc(text){
  const sch = {wires:[],flags:[],iopins:[],texts:[],symbols:[],
               lines:[],rects:[],circles:[],arcs:[]};
  let cur = null;
  for(const raw of text.split(/\r?\n/)){
    const line = raw.trimEnd();
    const t = line.trim().split(/\s+/);
    if(!t[0]) continue;
    const num = i=>parseInt(t[i],10);
    switch(t[0]){
      case "WIRE": sch.wires.push([num(1),num(2),num(3),num(4)]); break;
      case "FLAG": sch.flags.push({x:num(1),y:num(2),net:t.slice(3).join(" ")}); break;
      case "IOPIN": sch.iopins.push({x:num(1),y:num(2),dir:t[3]||""}); break;
      case "SYMBOL":
        cur = {name:t[1], x:num(2), y:num(3), rot:t[4]||"R0", attrs:{}, windows:{}};
        sch.symbols.push(cur);
        break;
      case "WINDOW":
        if(cur) cur.windows[t[1]] = {x:num(2),y:num(3),just:t[4],size:parseInt(t[5],10)||2};
        break;
      case "SYMATTR":
        if(cur) cur.attrs[t[1]] = t.slice(2).join(" ");
        break;
      case "TEXT": {
        const m = line.trim().match(/^TEXT\s+(-?\d+)\s+(-?\d+)\s+(\S+)\s+(\d+)\s+(.*)$/);
        if(m) sch.texts.push({x:+m[1],y:+m[2],just:m[3],size:+m[4],str:m[5]});
        break;
      }
      case "LINE":      sch.lines.push([num(2),num(3),num(4),num(5),num(6)||0]); break;
      case "RECTANGLE": sch.rects.push([num(2),num(3),num(4),num(5),num(6)||0]); break;
      case "CIRCLE":    sch.circles.push([num(2),num(3),num(4),num(5),num(6)||0]); break;
      case "ARC":       sch.arcs.push([num(2),num(3),num(4),num(5),num(6),num(7),num(8),num(9),num(10)||0]); break;
    }
  }
  return sch;
}
function makeXform(rot){
  const mirror = rot[0]==="M";
  const q = ((parseInt(rot.slice(1),10)||0)/90)|0;
  return {
    mirror,
    pt(px,py){
      if(mirror) px = -px;
      for(let i=0;i<q;i++){ const nx = -py; py = px; px = nx; }
      return [px,py];
    }
  };
}
function segHasPoint(w, x, y, excludeEnds){
  const [x1,y1,x2,y2] = w;
  if(x<Math.min(x1,x2)||x>Math.max(x1,x2)||y<Math.min(y1,y2)||y>Math.max(y1,y2)) return false;
  if((x2-x1)*(y-y1) !== (y2-y1)*(x-x1)) return false;
  if(excludeEnds && ((x===x1&&y===y1)||(x===x2&&y===y2))) return false;
  return true;
}
function distToSeg(px,py,x1,y1,x2,y2){
  const dx=x2-x1, dy=y2-y1, L2=dx*dx+dy*dy;
  let t = L2 ? ((px-x1)*dx+(py-y1)*dy)/L2 : 0;
  t = Math.max(0,Math.min(1,t));
  return Math.hypot(px-(x1+t*dx), py-(y1+t*dy));
}

/* ======================= schematic model ======================= */
function buildModel(sch){
  const placed = sch.symbols.map(sym=>{
    const asy = lookupSym(sym.name);
    const xf = makeXform(sym.rot);
    let bb = [1e9,1e9,-1e9,-1e9];
    const grow = (px,py)=>{ const [a,b]=xf.pt(px,py);
      const wx=sym.x+a, wy=sym.y+b;
      bb=[Math.min(bb[0],wx),Math.min(bb[1],wy),Math.max(bb[2],wx),Math.max(bb[3],wy)]; };
    if(asy){
      for(const l of asy.lines){grow(l[0],l[1]);grow(l[2],l[3]);}
      for(const r of asy.rects){grow(r[0],r[1]);grow(r[2],r[3]);}
      for(const c of asy.circles){grow(c[0],c[1]);grow(c[2],c[3]);}
      for(const a of asy.arcs){grow(a[0],a[1]);grow(a[2],a[3]);}
      for(const p of asy.pins){grow(p[0],p[1]);}
    } else { grow(0,0); grow(64,64); }
    const pins = asy ? asy.pins.map(p=>{const [a,b]=xf.pt(p[0],p[1]);return [sym.x+a,sym.y+b];}) : [];
    return {sym, asy, xf, bb, pins};
  });

  const parent = {};
  const find = k => { while(parent[k]!==k){ parent[k]=parent[parent[k]]; k=parent[k]; } return k; };
  const uni = (a,b)=>{ if(!(a in parent))parent[a]=a; if(!(b in parent))parent[b]=b;
                       a=find(a); b=find(b); if(a!==b) parent[b]=a; };
  const K = (x,y)=>x+","+y;
  const endCount = {};
  for(const w of sch.wires){
    uni(K(w[0],w[1]), K(w[2],w[3]));
    endCount[K(w[0],w[1])]=(endCount[K(w[0],w[1])]||0)+1;
    endCount[K(w[2],w[3])]=(endCount[K(w[2],w[3])]||0)+1;
  }
  const junctions = [];
  const pts = Object.keys(endCount).map(k=>k.split(",").map(Number));
  for(const [x,y] of pts){
    let touching = endCount[K(x,y)];
    for(const w of sch.wires){
      if(segHasPoint(w,x,y,true)){ touching += 2; uni(K(x,y), K(w[0],w[1])); }
    }
    if(touching>=3) junctions.push([x,y]);
  }
  const flagsByName = {};
  for(const f of sch.flags){
    const k = K(f.x,f.y);
    if(!(k in parent)) parent[k]=k;
    for(const w of sch.wires) if(segHasPoint(w,f.x,f.y,false)) uni(k, K(w[0],w[1]));
    (flagsByName[f.net] ||= []).push(k);
  }
  for(const ks of Object.values(flagsByName))
    for(let i=1;i<ks.length;i++) uni(ks[0],ks[i]);
  for(const p of placed) for(const [x,y] of p.pins){
    const k=K(x,y);
    if(!(k in parent)) parent[k]=k;
    for(const w of sch.wires) if(segHasPoint(w,x,y,false)) uni(k, K(w[0],w[1]));
  }
  const netOf = (x,y)=>{ const k=K(x,y); return (k in parent) ? find(k) : null; };
  const netNames = {};
  for(const f of sch.flags){ const r=netOf(f.x,f.y); if(r && f.net!=="0") netNames[r]=f.net; }

  let bb=[1e9,1e9,-1e9,-1e9];
  const grow=(x,y)=>{bb=[Math.min(bb[0],x),Math.min(bb[1],y),Math.max(bb[2],x),Math.max(bb[3],y)];};
  for(const w of sch.wires){grow(w[0],w[1]);grow(w[2],w[3]);}
  for(const p of placed){grow(p.bb[0],p.bb[1]);grow(p.bb[2],p.bb[3]);}
  for(const t of sch.texts){
    const px = FONT_BASE*FONT[Math.min(t.size,7)];
    const ls = String(t.str).split("\\n");
    const w = Math.max(...ls.map(l=>l.length))*px*0.62;
    grow(t.x,t.y); grow(t.x+w, t.y+ls.length*px*1.3);
  }
  return {sch, placed, junctions, netOf, netNames, bb};
}

/* ---- label schematic nets with LTspice netlist node names ---- */
function labelNets(m){
  const netByRef = {};
  for(const raw of NET_TEXT.split(/\r?\n/)){
    const t = raw.trim().split(/\s+/);
    if(!t[0] || /^[*.;+]/.test(t[0])) continue;
    netByRef[t[0].toUpperCase()] = t.slice(1);
  }
  const votes = {};   // root -> {node: count}
  for(const p of m.placed){
    if(!p.asy) continue;
    const inst = (p.sym.attrs.InstName||"").toUpperCase();
    const pref = (p.asy.prefix||"").toUpperCase();
    const nodes = netByRef[inst] || netByRef[pref+inst];
    if(!nodes) continue;
    p.pins.forEach(([x,y],i)=>{
      if(i>=nodes.length) return;
      const r = m.netOf(x,y);
      if(!r) return;
      ((votes[r] ||= {})[nodes[i]] ||= 0);
      votes[r][nodes[i]]++;
    });
  }
  m.nodeOfRoot = {};  m.rootOfNode = {};
  for(const [r,v] of Object.entries(votes)){
    const best = Object.entries(v).sort((a,b)=>b[1]-a[1])[0][0];
    m.nodeOfRoot[r] = best;
    if(!(best in m.rootOfNode)) m.rootOfNode[best] = r;
  }
  // ground: flags named 0
  for(const f of m.sch.flags) if(f.net==="0"){
    const r = m.netOf(f.x,f.y);
    if(r){ m.nodeOfRoot[r] = "0"; m.rootOfNode["0"] = r; break; }
  }
}

function makePane(cvId, tipId){
  const cv = document.getElementById(cvId);
  return {cv, ctx: cv.getContext("2d"), tip: document.getElementById(tipId),
          view:{scale:1,ox:0,oy:0}, draw:null};
}
function attachNav(pane, onClick, onMove){
  const cv = pane.cv, v = pane.view;
  let drag=null;
  cv.addEventListener("mousedown", e=>{
    drag={x:e.clientX,y:e.clientY,ox:v.ox,oy:v.oy,moved:false};
    cv.classList.add("panning");
  });
  cv.addEventListener("mousemove", e=>{
    if(drag){
      const dx=e.clientX-drag.x, dy=e.clientY-drag.y;
      if(Math.abs(dx)+Math.abs(dy)>3) drag.moved=true;
      v.ox=drag.ox+dx; v.oy=drag.oy+dy; pane.draw();
    } else if(onMove) onMove(e);
  });
  cv.addEventListener("mouseleave", ()=>{ pane.tip.style.display="none"; });
  cv.addEventListener("mouseup", e=>{
    cv.classList.remove("panning");
    if(drag && !drag.moved && onClick) onClick(e);
    drag=null;
  });
  cv.addEventListener("wheel", e=>{
    e.preventDefault();
    const f = Math.pow(1.0015, -e.deltaY);
    const r = cv.getBoundingClientRect();
    const mx=e.clientX-r.left, my=e.clientY-r.top;
    const wx=(mx-v.ox)/v.scale, wy=(my-v.oy)/v.scale;
    v.scale = Math.min(400, Math.max(0.005, v.scale*f));
    v.ox = mx-wx*v.scale; v.oy = my-wy*v.scale;
    pane.draw();
  },{passive:false});
}
function worldPos(pane,e){
  const r = pane.cv.getBoundingClientRect();
  return [(e.clientX-r.left-pane.view.ox)/pane.view.scale,
          (e.clientY-r.top-pane.view.oy)/pane.view.scale];
}
function fitPane(pane, bb, pad){
  const W=pane.cv.clientWidth, H=pane.cv.clientHeight;
  pane.view.scale = Math.min((W-2*pad)/Math.max(1,bb[2]-bb[0]),
                             (H-2*pad)/Math.max(1,bb[3]-bb[1]));
  pane.view.ox = W/2-(bb[0]+bb[2])/2*pane.view.scale;
  pane.view.oy = H/2-(bb[1]+bb[3])/2*pane.view.scale;
  pane.draw();
}
function prepCanvas(pane){
  const dpr=devicePixelRatio||1;
  const W=pane.cv.clientWidth,H=pane.cv.clientHeight;
  if(pane.cv.width!==W*dpr||pane.cv.height!==H*dpr){pane.cv.width=W*dpr;pane.cv.height=H*dpr;}
  pane.ctx.setTransform(dpr,0,0,dpr,0,0);
  pane.ctx.fillStyle=css("--bg"); pane.ctx.fillRect(0,0,W,H);
  pane.ctx.setTransform(dpr*pane.view.scale,0,0,dpr*pane.view.scale,
                        dpr*pane.view.ox, dpr*pane.view.oy);
  return [W,H];
}

function drawTextJust(ctx, str, x, y, just, sizeIdx, color){
  const px = FONT_BASE * FONT[Math.min(sizeIdx,7)];
  ctx.font = px+"px Verdana, sans-serif";
  ctx.fillStyle = color;
  let vertical=false, j=just;
  if(/^V/.test(j)){ vertical=true; j=j.slice(1); }
  const lines = String(str).split("\\n");
  let align="left", base="middle";
  if(j==="Right") align="right";
  else if(j==="Center") align="center";
  else if(j==="Top"){align="center"; base="top";}
  else if(j==="Bottom"){align="center"; base="bottom";}
  ctx.textAlign=align; ctx.textBaseline=base;
  ctx.save(); ctx.translate(x,y);
  if(vertical) ctx.rotate(-Math.PI/2);
  const lh=px*1.25;
  const y0 = base==="middle" ? -(lines.length-1)*lh/2 : (base==="bottom" ? -(lines.length-1)*lh : 0);
  lines.forEach((ln,i)=>ctx.fillText(ln,0,y0+i*lh));
  ctx.restore();
}
function arcPath(ctx,bx1,by1,bx2,by2,sx,sy,ex,ey,mirror){
  const cx=(bx1+bx2)/2, cy=(by1+by2)/2;
  const rx=Math.abs(bx2-bx1)/2, ry=Math.abs(by2-by1)/2;
  const a1=Math.atan2(sy-cy,sx-cx), a2=Math.atan2(ey-cy,ex-cx);
  ctx.beginPath();
  ctx.ellipse(cx,cy,Math.max(rx,.1),Math.max(ry,.1),0,a1,a2,!mirror);
  ctx.stroke();
}
function drawPrimitives(ctx, asy, xf, X, Y, stroke){
  ctx.strokeStyle = stroke;
  const P=(px,py)=>{const [a,b]=xf.pt(px,py);return [X+a,Y+b];};
  for(const [x1,y1,x2,y2,st] of asy.lines){
    const [a1,b1]=P(x1,y1),[a2,b2]=P(x2,y2);
    ctx.setLineDash(st?[4,3]:[]);
    ctx.beginPath(); ctx.moveTo(a1,b1); ctx.lineTo(a2,b2); ctx.stroke();
  }
  ctx.setLineDash([]);
  for(const [x1,y1,x2,y2] of asy.rects){
    const [a1,b1]=P(x1,y1),[a2,b2]=P(x2,y2);
    ctx.strokeRect(Math.min(a1,a2),Math.min(b1,b2),Math.abs(a2-a1),Math.abs(b2-b1));
  }
  for(const [x1,y1,x2,y2] of asy.circles){
    const [a1,b1]=P(x1,y1),[a2,b2]=P(x2,y2);
    ctx.beginPath();
    ctx.ellipse((a1+a2)/2,(b1+b2)/2,Math.abs(a2-a1)/2,Math.abs(b2-b1)/2,0,0,7);
    ctx.stroke();
  }
  for(const [x1,y1,x2,y2,sx,sy,ex,ey] of asy.arcs){
    const [a1,b1]=P(x1,y1),[a2,b2]=P(x2,y2);
    const [s1,s2]=P(sx,sy),[e1,e2]=P(ex,ey);
    arcPath(ctx,Math.min(a1,a2),Math.min(b1,b2),Math.max(a1,a2),Math.max(b1,b2),s1,s2,e1,e2,xf.mirror);
  }
}
const WINDOW_ATTR = {0:"InstName",3:"Value",38:"SpiceModel",39:"SpiceLine",40:"SpiceLine2"};

// Placeholder for symbols with no .asy available
function drawMissing(ctx, p, color){
  const [x1,y1,x2,y2] = p.bb;
  const w = x2-x1, h = y2-y1;
  ctx.fillStyle = "rgba(220,60,40,.10)";
  ctx.fillRect(x1,y1,w,h);
  ctx.strokeStyle = color;
  ctx.setLineDash([6,4]);
  ctx.strokeRect(x1,y1,w,h);
  ctx.setLineDash([]);
  const cx = (x1+x2)/2;
  ctx.fillStyle = color;
  ctx.font = Math.min(w,h)*0.5 + "px Verdana, sans-serif";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText("?", cx, y1+h*0.38);
  ctx.font = Math.min(w,h)*0.2 + "px Verdana, sans-serif";
  ctx.fillText(p.sym.name.split(/[\\\/]/).pop(), cx, y1+h*0.72);
  ctx.font = Math.min(w,h)*0.18 + "px Verdana, sans-serif";
  ctx.fillText(p.sym.attrs.InstName||"", cx, y1+h*0.9);
}

paneS.draw = function(){
  const [W,H] = prepCanvas(paneS);
  const ctx = paneS.ctx, v = paneS.view, sch = M.sch;
  const C = {wire:css("--wire"),sym:css("--sym"),comp:css("--comp-text"),flag:css("--flag"),
             comment:css("--comment"),directive:css("--directive"),hl:css("--hl"),grid:css("--grid")};
  const wx1=-v.ox/v.scale, wy1=-v.oy/v.scale, wx2=wx1+W/v.scale, wy2=wy1+H/v.scale;
  if(v.scale*16>=5){
    ctx.fillStyle=C.grid;
    const step=v.scale*16>=10?16:64, r=0.8/v.scale;
    for(let gx=Math.ceil(wx1/step)*step; gx<wx2; gx+=step)
      for(let gy=Math.ceil(wy1/step)*step; gy<wy2; gy+=step)
        ctx.fillRect(gx-r,gy-r,2*r,2*r);
  }
  ctx.lineWidth=Math.max(2/v.scale,0.9); ctx.lineCap="round"; ctx.lineJoin="round";
  drawPrimitives(ctx, sch, {mirror:false,pt:(x,y)=>[x,y]}, 0,0, C.sym);
  ctx.strokeStyle=C.wire;
  ctx.beginPath();
  for(const [x1,y1,x2,y2] of sch.wires){ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);}
  ctx.stroke();
  ctx.fillStyle=C.wire;
  for(const [x,y] of M.junctions){ctx.beginPath();ctx.arc(x,y,3.2,0,7);ctx.fill();}
  for(const p of M.placed){
    const {sym,asy,xf}=p;
    if(!asy){ drawMissing(ctx, p, C.hl); continue; }
    drawPrimitives(ctx, asy, xf, sym.x, sym.y, C.sym);
    for(const t of asy.texts){
      const [a,b]=xf.pt(t.x,t.y);
      drawTextJust(ctx,t.str,sym.x+a,sym.y+b,t.just,Math.max(t.size,0),C.sym);
    }
    const slots=new Set([...Object.keys(asy.windows),...Object.keys(sym.windows)]);
    for(const n of slots){
      const attr=WINDOW_ATTR[n]; if(!attr) continue;
      let val=sym.attrs[attr];
      if(val===undefined && attr==="Value") val=asy.value;
      if(val==null) continue;
      const w=sym.windows[n]||asy.windows[n];
      const [a,b]=xf.pt(w.x,w.y);
      let just=w.just;
      if(xf.mirror){ if(just==="Left")just="Right"; else if(just==="Right")just="Left"; }
      drawTextJust(ctx,val,sym.x+a,sym.y+b,just,w.size,C.comp);
    }
  }
  for(const f of sch.flags){
    if(f.net==="0"){
      ctx.strokeStyle=C.wire;
      ctx.beginPath();
      ctx.moveTo(f.x-12,f.y);ctx.lineTo(f.x+12,f.y);ctx.lineTo(f.x,f.y+12);
      ctx.closePath();ctx.stroke();
    } else drawTextJust(ctx,f.net,f.x,f.y-5,"Bottom",1.6,C.flag);
  }
  for(const t of sch.texts){
    drawTextJust(ctx,t.str.replace(/^[!;]/,""),t.x,t.y,t.just,t.size,
                 t.str.startsWith("!")?C.directive:C.comment);
  }
  if(sel && sel.root){
    ctx.strokeStyle=C.hl; ctx.lineWidth=Math.max(3.5/v.scale,1.8);
    ctx.beginPath();
    for(const [x1,y1,x2,y2] of sch.wires)
      if(M.netOf(x1,y1)===sel.root){ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);}
    ctx.stroke();
    ctx.fillStyle=C.hl;
    for(const f of sch.flags)
      if(M.netOf(f.x,f.y)===sel.root){ctx.beginPath();ctx.arc(f.x,f.y,4.5,0,7);ctx.fill();}
    for(const p of M.placed)
      for(const [x,y] of p.pins)
        if(M.netOf(x,y)===sel.root){ctx.beginPath();ctx.arc(x,y,4.5,0,7);ctx.fill();}
  }
};

      tip.style.display="block";

const paneP = makePane("cvP","tipP");
const PCB_BB = [PCB.edges_bbox.minx, PCB.edges_bbox.miny, PCB.edges_bbox.maxx, PCB.edges_bbox.maxy];
let pcbMirror = false;
// convert a pane-world x into board x (undo the mirror) for hit-testing
const boardX = wx => pcbMirror ? PCB_BB[0]+PCB_BB[2]-wx : wx;

function padCorners(p){ // rotated rect corners (world)
  const [cx,cy]=p.pos, [w,h]=p.size, a=(p.angle||0)*Math.PI/180;
  const ca=Math.cos(a), sa=Math.sin(a);
  return [[-w/2,-h/2],[w/2,-h/2],[w/2,h/2],[-w/2,h/2]]
    .map(([x,y])=>[cx+x*ca-y*sa, cy+x*sa+y*ca]);
}
function drawPad(ctx,p,fill){
  const [cx,cy]=p.pos, [w,h]=p.size, a=(p.angle||0)*Math.PI/180;
  ctx.save(); ctx.translate(cx,cy); ctx.rotate(a);
  ctx.fillStyle=fill;
  ctx.beginPath();
  if(p.shape==="circle"){ ctx.arc(0,0,w/2,0,7); }
  else if(p.shape==="oval"||p.shape==="roundrect"){
    const r=p.shape==="oval"?Math.min(w,h)/2:(p.radius||Math.min(w,h)*0.25);
    ctx.roundRect(-w/2,-h/2,w,h,r);
  }
  else ctx.rect(-w/2,-h/2,w,h);
  ctx.fill();
  if(p.drillsize){
    ctx.fillStyle=css("--padhole");
    ctx.beginPath(); ctx.arc(0,0,p.drillsize[0]/2,0,7); ctx.fill();
  }
  if(p.pin1){
    ctx.strokeStyle=css("--fg"); ctx.lineWidth=0.12;
    ctx.strokeRect(-w/2,-h/2,w,h);
  }
  ctx.restore();
}
paneP.draw = function(){
  prepCanvas(paneP);
  const ctx=paneP.ctx, v=paneP.view;
  if(pcbMirror) ctx.transform(-1,0,0,1, PCB_BB[0]+PCB_BB[2], 0);
  const C={board:css("--board"),edge:css("--edge"),tF:css("--trackF"),tB:css("--trackB"),
           pad:css("--pad"),zone:css("--zone"),ref:css("--ref"),hl:css("--hl")};
  // board substrate
  ctx.fillStyle=C.board;
  for(const e of PCB.edges) if(e.type==="polygon")
    for(const ring of e.polygons){
      ctx.beginPath();
      ring.forEach(([x,y],i)=> i?ctx.lineTo(x,y):ctx.moveTo(x,y));
      ctx.closePath(); ctx.fill();
    }
  // ground zone (back copper pour)
  ctx.fillStyle = (sel && sel.pcbNet==="0") ? "rgba(229,57,53,.25)" : C.zone;
  for(const z of PCB.zones.B){
    ctx.beginPath();
    for(const ring of z.polygons){
      ring.forEach(([x,y],i)=> i?ctx.lineTo(x,y):ctx.moveTo(x,y));
      ctx.closePath();
    }
    ctx.fill("evenodd");
  }
  // tracks: far layer first, near layer on top (front view: B then F)
  const layerOrder = pcbMirror ? [["F",C.tF],["B",C.tB]] : [["B",C.tB],["F",C.tF]];
  for(const [layer,color] of layerOrder){
    for(const t of PCB.tracks[layer]){
      ctx.strokeStyle=color; ctx.lineCap="round";
      ctx.lineWidth=t.width;
      ctx.beginPath(); ctx.moveTo(t.start[0],t.start[1]); ctx.lineTo(t.end[0],t.end[1]); ctx.stroke();
    }
  }
  // pads
  for(const f of PCB.footprints) for(const p of f.pads) drawPad(ctx,p,C.pad);
  // board edge
  ctx.strokeStyle=C.edge; ctx.lineWidth=Math.max(0.25, 1.5/v.scale);
  for(const e of PCB.edges) if(e.type==="polygon")
    for(const ring of e.polygons){
      ctx.beginPath();
      ring.forEach(([x,y],i)=> i?ctx.lineTo(x,y):ctx.moveTo(x,y));
      ctx.closePath(); ctx.stroke();
    }
  // reference designators at pad centroid
  if(v.scale>3){
    ctx.fillStyle=C.ref; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.font="2px Verdana, sans-serif";
    for(const f of PCB.footprints){
      if(!f.pads.length) continue;
      let cx=0,cy=0;
      for(const p of f.pads){cx+=p.pos[0];cy+=p.pos[1];}
      ctx.save();
      ctx.translate(cx/f.pads.length, cy/f.pads.length - (f.pads[0].size[1]||2)*0.9);
      if(pcbMirror) ctx.scale(-1,1);   // keep text readable in back view
      ctx.fillText(f.ref, 0, 0);
      ctx.restore();
    }
  }
  // highlight
  if(sel && sel.pcbNet!=null){
    ctx.strokeStyle=C.hl;
    for(const layer of ["B","F"])
      for(const t of PCB.tracks[layer]) if(t.net===sel.pcbNet){
        ctx.lineWidth=t.width+0.3;
        ctx.beginPath(); ctx.moveTo(t.start[0],t.start[1]); ctx.lineTo(t.end[0],t.end[1]); ctx.stroke();
      }
    for(const f of PCB.footprints) for(const p of f.pads)
      if(p.net===sel.pcbNet) drawPad(ctx,p,C.hl);
  }
};
function padAt(wx,wy){
  for(const f of PCB.footprints) for(const p of f.pads){
    const a=-(p.angle||0)*Math.PI/180;
    const dx=wx-p.pos[0], dy=wy-p.pos[1];
    const lx=dx*Math.cos(a)-dy*Math.sin(a), ly=dx*Math.sin(a)+dy*Math.cos(a);
    if(Math.abs(lx)<=p.size[0]/2+0.2 && Math.abs(ly)<=p.size[1]/2+0.2) return {f,p};
  }
  return null;
}
attachNav(paneP,
  function onClick(e){
    let [wx,wy]=worldPos(paneP,e);
    wx = boardX(wx);
    const hit=padAt(wx,wy);
    let net = hit ? hit.p.net : null;
    if(!net){
      let bd=0.6;
      for(const layer of ["F","B"])
        for(const t of PCB.tracks[layer]){
          const d=distToSeg(wx,wy,t.start[0],t.start[1],t.end[0],t.end[1])-t.width/2;
          if(d<bd){bd=d;net=t.net;}
        }
    }
    if(net!=null && net!==""){
      const node=PCB2NODE[net];
      if(node) select(node);
      else{
        sel={node:null,pcbNet:net,root:null};
        document.getElementById("netinfo").innerHTML=
          `LTspice: <span class="dim">no mapping</span> ⇄ PCB: ${net}`;
        paneS.draw(); paneP.draw();
      }
    } else select(null);
  },
  function onMove(e){
    let [wx,wy]=worldPos(paneP,e);
    wx = boardX(wx);
    const hit=padAt(wx,wy);
    const tip=paneP.tip;
    if(hit){
      const node=PCB2NODE[hit.p.net];
      tip.innerHTML=`<b>${hit.f.ref}</b>`
        +(hit.p.net?`<br>net: ${hit.p.net}`:"<br><span style='opacity:.6'>no net</span>")
        +(node?`<br><span style="opacity:.6">LTspice: ${node}</span>`:"");
      const r=paneP.cv.getBoundingClientRect();
      tip.style.left=(e.clientX-r.left+14)+"px"; tip.style.top=(e.clientY-r.top+10)+"px";
      tip.style.display="block";
    } else tip.style.display="none";
  });

});
new ResizeObserver(()=>{paneS.draw();paneP.draw();}).observe(document.querySelector("main"));

const mapped=Object.keys(NODE2PCB).length;
document.getElementById("mapinfo").textContent =
  `${mapped} nets mapped · ${PCB.footprints.length} footprints · ${M.sch.symbols.length} schematic components`;

fitPane(paneS, PA_BB, 10);   // start focused on the power-amp section
fitPane(paneP, PCB_BB, 25);

/* ======================= URL (#net=NAME) deep-linking ======================= */
function resolveName(raw){
  if(!raw) return null;
  const up = decodeURIComponent(raw).trim().toUpperCase();
  // 1) exact LTspice node (mapped to PCB) or any schematic node
  for(const k of Object.keys(NODE2PCB)) if(k.toUpperCase()===up) return k;
  for(const k of Object.keys(M.rootOfNode)) if(k.toUpperCase()===up) return k;
  // 2) PCB net name → LTspice node
  for(const k of Object.keys(PCB2NODE)) if(k.toUpperCase()===up) return PCB2NODE[k];
  // 3) schematic flag alias (e.g. VRAW+, SPEAKER) → its node
  for(const r in M.netNames) if(M.netNames[r].toUpperCase()===up) return M.nodeOfRoot[r] ?? null;
  return null;
}
function applyHash(){
  const m = /[#&]net=([^&]+)/i.exec(location.hash);
  if(!m){ return; }
  const node = resolveName(m[1]);
  if(node){ select(node); }
  else {
    document.getElementById("netinfo").innerHTML =
      `<span class="dim">No net matches "</span>${m[1]}<span class="dim">" — click a wire/pad instead</span>`;
  }
}
window.addEventListener("hashchange", applyHash);
applyHash();
</script>
