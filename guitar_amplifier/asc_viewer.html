<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LTspice .asc Viewer</title>
<style>
  :root{
    --bg:#fcfcfa; --panel:#f1f1ee; --border:#d5d5d0; --fg:#222;
    --wire:#0433a8; --sym:#0433a8; --comp-text:#073ec2; --flag:#8b2fa8;
    --comment:#2e7d32; --directive:#6a1b9a; --grid:#dddddb; --hl:#e53935;
    --pin:#c62828; --chipbg:#fff;
  }
  .dark{
    --bg:#16181d; --panel:#1f2228; --border:#33363e; --fg:#d7dae0;
    --wire:#7ab4ff; --sym:#7ab4ff; --comp-text:#9fc5ff; --flag:#e0a3f0;
    --comment:#7fc97f; --directive:#ce93d8; --grid:#262932; --hl:#ff6e6e;
    --pin:#ff8a80; --chipbg:#23262d;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font:14px/1.4 -apple-system,"Segoe UI",sans-serif;background:var(--bg);color:var(--fg)}
  #app{display:flex;flex-direction:column;height:100%}
  header{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--panel);
         border-bottom:1px solid var(--border);flex-wrap:wrap}
  header h1{font-size:15px;margin:0 8px 0 0;font-weight:600;white-space:nowrap}
  button,label.btn{background:var(--chipbg);border:1px solid var(--border);color:var(--fg);
         border-radius:6px;padding:5px 12px;font-size:13px;cursor:pointer}
  button:hover,label.btn:hover{border-color:var(--fg)}
  #fileName{font-weight:600;max-width:30ch;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #stats{opacity:.75;font-size:12.5px;white-space:nowrap}
  #warn{color:#c77700;font-size:12.5px}
  #netinfo{font-size:12.5px;color:var(--hl);font-weight:600}
  #wrap{position:relative;flex:1;overflow:hidden}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;cursor:grab}
  canvas.panning{cursor:grabbing}
  #drop{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
        pointer-events:none;transition:opacity .15s}
  #drop .box{border:2px dashed var(--border);border-radius:14px;padding:42px 56px;text-align:center;
        background:color-mix(in srgb, var(--panel) 88%, transparent)}
  #drop h2{margin:0 0 8px;font-size:18px}
  #drop p{margin:4px 0;opacity:.75}
  #drop.hidden{opacity:0}
  body.dragging #drop{opacity:1 !important}
  body.dragging #drop .box{border-color:var(--hl)}
  #tip{position:absolute;pointer-events:none;background:var(--chipbg);border:1px solid var(--border);
       border-radius:6px;padding:6px 9px;font-size:12.5px;display:none;z-index:5;box-shadow:0 2px 10px rgba(0,0,0,.18)}
  #tip b{font-size:13px}
  footer{padding:4px 12px;background:var(--panel);border-top:1px solid var(--border);
         font-size:12px;opacity:.7;display:flex;gap:16px;flex-wrap:wrap}
  input[type=file]{display:none}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>LTspice .asc Viewer</h1>
    <label class="btn">Open .asc / .asy<input id="file" type="file" multiple accept=".asc,.asy,.txt"></label>
    <span id="fileName"></span>
    <span id="stats"></span>
    <span id="warn"></span>
    <span id="netinfo"></span>
    <span style="flex:1"></span>
    <button id="fitBtn" title="Zoom to fit (F)">Fit</button>
    <button id="gridBtn" title="Toggle grid (G)">Grid</button>
    <button id="themeBtn" title="Toggle theme (T)">Theme</button>
    <button id="pngBtn" title="Export current view as PNG">PNG</button>
  </header>
  <div id="wrap">
    <canvas id="cv"></canvas>
    <div id="drop"><div class="box">
      <h2>Drop an LTspice <code>.asc</code> file here</h2>
      <p>or use the <b>Open</b> button above</p>
      <p>Drop <code>.asy</code> files alongside to add custom symbols</p>
      <p style="font-size:12px">UTF-16 and ASCII encodings are auto-detected</p>
    </div></div>
    <div id="tip"></div>
  </div>
  <footer>
    <span>Drag to pan &middot; wheel to zoom &middot; click a wire to highlight its net (Esc clears)</span>
    <span>Keys: F fit &middot; G grid &middot; T theme</span>
    <span id="libinfo"></span>
  </footer>
</div>

const userLib = {};           // name -> parsed asy, from dropped .asy files

/* ======================= encoding + parsing ======================= */
function decodeBuf(buf){
  const u = new Uint8Array(buf);
  if(u[0]===0xFF && u[1]===0xFE) return new TextDecoder("utf-16le").decode(u.subarray(2));
  if(u[0]===0xFE && u[1]===0xFF) return new TextDecoder("utf-16be").decode(u.subarray(2));
  let zeros=0, n=Math.min(u.length, 512);
  for(let i=1;i<n;i+=2) if(u[i]===0) zeros++;
  if(zeros > n/8) return new TextDecoder("utf-16le").decode(u);
  return new TextDecoder("utf-8").decode(u);
}
const FONT = [0.625,1,1.5,2,2.5,3.5,5,7];  // LTspice text size table
const FONT_BASE = 9;                        // world units per size step

function parseAsy(text){
  const s = {lines:[],rects:[],circles:[],arcs:[],texts:[],pins:[],windows:{},value:null,prefix:null};
  for(const raw of text.split(/\r?\n/)){
    const t = raw.trim().split(/\s+/);
    if(!t[0]) continue;
    const num = i=>parseInt(t[i],10);
    switch(t[0]){
      case "LINE":      s.lines.push([num(2),num(3),num(4),num(5),num(6)||0]); break;
      case "RECTANGLE": s.rects.push([num(2),num(3),num(4),num(5),num(6)||0]); break;
      case "CIRCLE":    s.circles.push([num(2),num(3),num(4),num(5),num(6)||0]); break;
      case "ARC":       s.arcs.push([num(2),num(3),num(4),num(5),num(6),num(7),num(8),num(9),num(10)||0]); break;
      case "PIN":       s.pins.push([num(1),num(2)]); break;
      case "WINDOW":    s.windows[t[1]] = {x:num(2),y:num(3),just:t[4],size:num(5)||2}; break;
      case "TEXT": {
        const m = raw.trim().match(/^TEXT\s+(-?\d+)\s+(-?\d+)\s+(\S+)\s+(\d+)\s+(.*)$/);
        if(m) s.texts.push({x:+m[1],y:+m[2],just:m[3],size:+m[4],str:m[5]});
        break;
      }
      case "SYMATTR":
        if(t[1]==="Value")  s.value  = t.slice(2).join(" ");
        if(t[1]==="Prefix") s.prefix = t.slice(2).join(" ");
        break;
    }
  }
  return s;
}
function lookupSym(name){
  const base = name.split(/[\\\/]/).pop().toLowerCase();
  if(userLib[base]) return userLib[base];
  if(parsedLib[base]) return parsedLib[base];
  const key = Object.keys(LIB).find(k=>k.toLowerCase()===base);
  if(key) return (parsedLib[base] = parseAsy(LIB[key]));
  return null;
}

function parseAsc(text){
  const sch = {wires:[],flags:[],iopins:[],texts:[],symbols:[],
               lines:[],rects:[],circles:[],arcs:[]};
  let cur = null;
  for(const raw of text.split(/\r?\n/)){
    const line = raw.trimEnd();
    const t = line.trim().split(/\s+/);
    if(!t[0]) continue;
    const num = i=>parseInt(t[i],10);
    switch(t[0]){
      case "WIRE": sch.wires.push([num(1),num(2),num(3),num(4)]); break;
      case "FLAG": sch.flags.push({x:num(1),y:num(2),net:t.slice(3).join(" ")}); break;
      case "IOPIN": sch.iopins.push({x:num(1),y:num(2),dir:t[3]||""}); break;
      case "DATAFLAG": {
        const m=line.trim().match(/^DATAFLAG\s+(-?\d+)\s+(-?\d+)\s+(.*)$/);
        if(m) sch.texts.push({x:+m[1],y:+m[2],just:"Left",size:1,str:";"+m[3].replace(/^"|"$/g,"")});
        break;
      }
      case "SYMBOL":
        cur = {name:t[1], x:num(2), y:num(3), rot:t[4]||"R0", attrs:{}, windows:{}};
        sch.symbols.push(cur);
        break;
      case "WINDOW":
        if(cur) cur.windows[t[1]] = {x:num(2),y:num(3),just:t[4],size:parseInt(t[5],10)||2};
        break;
      case "SYMATTR":
        if(cur) cur.attrs[t[1]] = t.slice(2).join(" ");
        break;
      case "TEXT": {
        const m = line.trim().match(/^TEXT\s+(-?\d+)\s+(-?\d+)\s+(\S+)\s+(\d+)\s+(.*)$/);
        if(m) sch.texts.push({x:+m[1],y:+m[2],just:m[3],size:+m[4],str:m[5]});
        break;
      }
      case "LINE":      sch.lines.push([num(2),num(3),num(4),num(5),num(6)||0]); break;
      case "RECTANGLE": sch.rects.push([num(2),num(3),num(4),num(5),num(6)||0]); break;
      case "CIRCLE":    sch.circles.push([num(2),num(3),num(4),num(5),num(6)||0]); break;
      case "ARC":       sch.arcs.push([num(2),num(3),num(4),num(5),num(6),num(7),num(8),num(9),num(10)||0]); break;
    }
  }
  return sch;
}

/* ======================= geometry helpers ======================= */
// LTspice orientation: Mn mirrors x first, then n/90 quarter turns of (x,y)->(-y,x).
function makeXform(rot){
  const mirror = rot[0]==="M";
  const q = ((parseInt(rot.slice(1),10)||0)/90)|0;
  return {
    mirror,
    pt(px,py){
      if(mirror) px = -px;
      for(let i=0;i<q;i++){ const nx = -py; py = px; px = nx; }
      return [px,py];
    }
  };
}
function segHasPoint(w, x, y, excludeEnds){
  const [x1,y1,x2,y2] = w;
  if(x<Math.min(x1,x2)||x>Math.max(x1,x2)||y<Math.min(y1,y2)||y>Math.max(y1,y2)) return false;
  if((x2-x1)*(y-y1) !== (y2-y1)*(x-x1)) return false;
  if(excludeEnds && ((x===x1&&y===y1)||(x===x2&&y===y2))) return false;
  return true;
}

/* ======================= model build ======================= */
let model = null;
function buildModel(sch, fileLabel){
  const missing = new Set();
  const placed = sch.symbols.map(sym=>{
    const asy = lookupSym(sym.name);
    if(!asy) missing.add(sym.name.split(/[\\\/]/).pop());
    const xf = makeXform(sym.rot);
    // bbox in world coords for tooltips
    let bb = [1e9,1e9,-1e9,-1e9];
    const grow = (px,py)=>{ const [a,b]=xf.pt(px,py);
      const wx=sym.x+a, wy=sym.y+b;
      bb=[Math.min(bb[0],wx),Math.min(bb[1],wy),Math.max(bb[2],wx),Math.max(bb[3],wy)]; };
    if(asy){
      for(const l of asy.lines){grow(l[0],l[1]);grow(l[2],l[3]);}
      for(const r of asy.rects){grow(r[0],r[1]);grow(r[2],r[3]);}
      for(const c of asy.circles){grow(c[0],c[1]);grow(c[2],c[3]);}
      for(const a of asy.arcs){grow(a[0],a[1]);grow(a[2],a[3]);}
      for(const p of asy.pins){grow(p[0],p[1]);}
    } else { grow(0,0); grow(64,64); }
    const pins = asy ? asy.pins.map(p=>{const [a,b]=xf.pt(p[0],p[1]);return [sym.x+a,sym.y+b];}) : [];
    return {sym, asy, xf, bb, pins};
  });

  // junctions + connectivity (union-find over points)
  const parent = {};
  const find = k => { while(parent[k]!==k){ parent[k]=parent[parent[k]]; k=parent[k]; } return k; };
  const uni = (a,b)=>{ if(!(a in parent))parent[a]=a; if(!(b in parent))parent[b]=b;
                       a=find(a); b=find(b); if(a!==b) parent[b]=a; };
  const K = (x,y)=>x+","+y;
  const endCount = {};
  for(const w of sch.wires){
    uni(K(w[0],w[1]), K(w[2],w[3]));
    endCount[K(w[0],w[1])]=(endCount[K(w[0],w[1])]||0)+1;
    endCount[K(w[2],w[3])]=(endCount[K(w[2],w[3])]||0)+1;
  }
  const junctions = [];
  const pts = Object.keys(endCount).map(k=>k.split(",").map(Number));
  for(const [x,y] of pts){
    let touching = endCount[K(x,y)];
    for(const w of sch.wires){
      if(segHasPoint(w,x,y,true)){ touching += 2; uni(K(x,y), K(w[0],w[1])); }
    }
    if(touching>=3) junctions.push([x,y]);
  }
  // merge same-named flags into one net
  const flagsByName = {};
  for(const f of sch.flags){
    const k = K(f.x,f.y);
    if(!(k in parent)) parent[k]=k;
    for(const w of sch.wires) if(segHasPoint(w,f.x,f.y,false)) uni(k, K(w[0],w[1]));
    (flagsByName[f.net] ||= []).push(k);
  }
  for(const ks of Object.values(flagsByName))
    for(let i=1;i<ks.length;i++) uni(ks[0],ks[i]);
  // attach pins so clicking near a pin works too
  for(const p of placed) for(const [x,y] of p.pins){
    const k=K(x,y);
    if(!(k in parent)) parent[k]=k;
    for(const w of sch.wires) if(segHasPoint(w,x,y,false)) uni(k, K(w[0],w[1]));
  }
  const netOf = (x,y)=>{ const k=K(x,y); return (k in parent) ? find(k) : null; };
  const netNames = {};
  for(const f of sch.flags){ const r=netOf(f.x,f.y); if(r && f.net!=="0") netNames[r]=f.net; }

  // floating pins (no wire, no flag at that point)
  const flagPts = new Set(sch.flags.map(f=>K(f.x,f.y)));
  const floatPins = [];
  for(const p of placed) for(const [x,y] of p.pins){
    if(flagPts.has(K(x,y))) continue;
    if(!sch.wires.some(w=>segHasPoint(w,x,y,false))) floatPins.push([x,y]);
  }

  // world bbox of everything
  let bb=[1e9,1e9,-1e9,-1e9];
  const grow=(x,y)=>{bb=[Math.min(bb[0],x),Math.min(bb[1],y),Math.max(bb[2],x),Math.max(bb[3],y)];};
  for(const w of sch.wires){grow(w[0],w[1]);grow(w[2],w[3]);}
  for(const p of placed){grow(p.bb[0],p.bb[1]);grow(p.bb[2],p.bb[3]);}
  for(const f of sch.flags){grow(f.x-40,f.y-20);grow(f.x+40,f.y+20);}
  for(const t of sch.texts){
    const px = FONT_BASE*FONT[Math.min(t.size,7)];
    const ls = String(t.str).split("\\n");
    const w = Math.max(...ls.map(l=>l.length))*px*0.62;
    grow(t.x,t.y); grow(t.x+w, t.y+ls.length*px*1.3);
  }
  if(bb[0]>bb[2]) bb=[0,0,1000,800];

  model = {sch, placed, junctions, floatPins, netOf, netNames, bb, fileLabel,
           highlight:null};
  document.getElementById("fileName").textContent = fileLabel;
  document.getElementById("stats").textContent =
    `${sch.symbols.length} components · ${sch.wires.length} wires · ${sch.flags.length} flags`;
  document.getElementById("warn").textContent = missing.size
    ? `Missing symbols (placeholders shown): ${[...missing].join(", ")} — drop their .asy here`
    : "";
  document.getElementById("drop").classList.add("hidden");
}

/* ======================= rendering ======================= */
const cv = document.getElementById("cv");
const ctx = cv.getContext("2d");
let view = {scale:1, ox:0, oy:0};   // screen = world*scale + o
let showGrid = true;

const css = name => getComputedStyle(document.body).getPropertyValue(name).trim();

function colors(){
  return { wire:css("--wire"), sym:css("--sym"), comp:css("--comp-text"),
           flag:css("--flag"), comment:css("--comment"), directive:css("--directive"),
           grid:css("--grid"), hl:css("--hl"), pin:css("--pin"), bg:css("--bg") };
}

function fit(){
  if(!model) return;
  const [x1,y1,x2,y2] = model.bb;
  const W = cv.clientWidth, H = cv.clientHeight, pad = 40;
  view.scale = Math.min((W-2*pad)/Math.max(1,x2-x1), (H-2*pad)/Math.max(1,y2-y1));
  view.scale = Math.min(view.scale, 4);
  view.ox = W/2 - (x1+x2)/2*view.scale;
  view.oy = H/2 - (y1+y2)/2*view.scale;
  draw();
}

function drawTextJust(str, x, y, just, sizeIdx, color){
  const px = FONT_BASE * FONT[Math.min(sizeIdx,7)];
  ctx.font = px+"px Verdana, sans-serif";
  ctx.fillStyle = color;
  let vertical = false, j = just;
  if(/^V/.test(j) && j!=="Vertical"){ vertical = true; j = j.slice(1); }
  const lines = String(str).split("\\n");
  let align="left", base="middle";
  if(j==="Right")  align="right";
  else if(j==="Center"){align="center";}
  else if(j==="Top"){align="center"; base="top";}
  else if(j==="Bottom"){align="center"; base="bottom";}
  ctx.textAlign = align; ctx.textBaseline = base;
  ctx.save();
  ctx.translate(x,y);
  if(vertical) ctx.rotate(-Math.PI/2);
  const lh = px*1.25;
  const y0 = base==="middle" ? -(lines.length-1)*lh/2 : (base==="bottom" ? -(lines.length-1)*lh : 0);
  lines.forEach((ln,i)=>ctx.fillText(ln, 0, y0+i*lh));
  ctx.restore();
}

function arcPath(bx1,by1,bx2,by2, sx,sy, ex,ey, mirror){
  const cx=(bx1+bx2)/2, cy=(by1+by2)/2;
  const rx=Math.abs(bx2-bx1)/2, ry=Math.abs(by2-by1)/2;
  const a1=Math.atan2(sy-cy, sx-cx), a2=Math.atan2(ey-cy, ex-cx);
  ctx.beginPath();
  // LTspice sweeps counterclockwise (screen coords) from start to end; mirror flips it
  ctx.ellipse(cx, cy, Math.max(rx,.1), Math.max(ry,.1), 0, a1, a2, !mirror);
  ctx.stroke();
}

function drawPrimitives(asy, xf, X, Y, stroke){
  ctx.strokeStyle = stroke;
  const P = (px,py)=>{ const [a,b]=xf.pt(px,py); return [X+a, Y+b]; };
  for(const [x1,y1,x2,y2,st] of asy.lines){
    const [a1,b1]=P(x1,y1), [a2,b2]=P(x2,y2);
    ctx.setLineDash(st?[4,3]:[]);
    ctx.beginPath(); ctx.moveTo(a1,b1); ctx.lineTo(a2,b2); ctx.stroke();
  }
  ctx.setLineDash([]);
  for(const [x1,y1,x2,y2] of asy.rects){
    const [a1,b1]=P(x1,y1), [a2,b2]=P(x2,y2);
    ctx.strokeRect(Math.min(a1,a2),Math.min(b1,b2),Math.abs(a2-a1),Math.abs(b2-b1));
  }
  for(const [x1,y1,x2,y2] of asy.circles){
    const [a1,b1]=P(x1,y1), [a2,b2]=P(x2,y2);
    ctx.beginPath();
    ctx.ellipse((a1+a2)/2,(b1+b2)/2,Math.abs(a2-a1)/2,Math.abs(b2-b1)/2,0,0,2*Math.PI);
    ctx.stroke();
  }
  for(const [x1,y1,x2,y2,sx,sy,ex,ey] of asy.arcs){
    const [a1,b1]=P(x1,y1), [a2,b2]=P(x2,y2);
    const [s1,s2]=P(sx,sy), [e1,e2]=P(ex,ey);
    arcPath(Math.min(a1,a2),Math.min(b1,b2),Math.max(a1,a2),Math.max(b1,b2),s1,s2,e1,e2,xf.mirror);
  }
}

const WINDOW_ATTR = {0:"InstName",3:"Value",38:"SpiceModel",39:"SpiceLine",40:"SpiceLine2"};

// Placeholder for symbols with no .asy available: a clearly-broken-looking
// box with a big "?", the missing symbol name, and the instance name.
function drawMissing(ctx, p, C){
  const [x1,y1,x2,y2] = p.bb;
  const w = x2-x1, h = y2-y1;
  ctx.fillStyle = "rgba(220,60,40,.10)";
  ctx.fillRect(x1,y1,w,h);
  ctx.strokeStyle = C.pin;
  ctx.setLineDash([6,4]);
  ctx.strokeRect(x1,y1,w,h);
  ctx.setLineDash([]);
  const cx = (x1+x2)/2;
  ctx.fillStyle = C.pin;
  ctx.font = Math.min(w,h)*0.5 + "px Verdana, sans-serif";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText("?", cx, y1+h*0.38);
  ctx.font = Math.min(w,h)*0.2 + "px Verdana, sans-serif";
  ctx.fillText(p.sym.name.split(/[\\\/]/).pop(), cx, y1+h*0.72);
  ctx.font = Math.min(w,h)*0.18 + "px Verdana, sans-serif";
  ctx.fillText(p.sym.attrs.InstName||"", cx, y1+h*0.9);
}

function draw(){
  const dpr = devicePixelRatio||1;
  const W = cv.clientWidth, H = cv.clientHeight;
  if(cv.width!==W*dpr||cv.height!==H*dpr){ cv.width=W*dpr; cv.height=H*dpr; }
  const C = colors();
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.fillStyle = C.bg; ctx.fillRect(0,0,W,H);
  if(!model){ return; }
  ctx.setTransform(dpr*view.scale,0,0,dpr*view.scale, dpr*view.ox, dpr*view.oy);
  const m = model, sch = m.sch;
  const wx1 = -view.ox/view.scale, wy1 = -view.oy/view.scale;
  const wx2 = wx1+W/view.scale,   wy2 = wy1+H/view.scale;

  // grid
  if(showGrid && view.scale*16 >= 5){
    ctx.fillStyle = C.grid;
    const step = view.scale*16>=10 ? 16 : 64;
    const r = 0.8/view.scale;
    for(let gx=Math.ceil(wx1/step)*step; gx<wx2; gx+=step)
      for(let gy=Math.ceil(wy1/step)*step; gy<wy2; gy+=step)
        ctx.fillRect(gx-r, gy-r, 2*r, 2*r);
  }

  ctx.lineWidth = Math.max(2/view.scale, 0.9);
  ctx.lineCap = "round"; ctx.lineJoin = "round";

  // schematic-level graphics
  drawPrimitives(sch, {mirror:false, pt:(x,y)=>[x,y]}, 0, 0, C.sym);

  // wires
  ctx.strokeStyle = C.wire;
  ctx.beginPath();
  for(const [x1,y1,x2,y2] of sch.wires){ ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); }
  ctx.stroke();

  // junction dots
  ctx.fillStyle = C.wire;
  for(const [x,y] of m.junctions){ ctx.beginPath(); ctx.arc(x,y,3.2,0,7); ctx.fill(); }

  // symbols
  for(const p of m.placed){
    const {sym, asy, xf} = p;
    if(!asy){ drawMissing(ctx, p, C); continue; }
    drawPrimitives(asy, xf, sym.x, sym.y, C.sym);
    for(const t of asy.texts){
      const [a,b] = xf.pt(t.x,t.y);
      drawTextJust(t.str, sym.x+a, sym.y+b, t.just, Math.max(t.size,0), C.sym);
    }
    // attribute windows (InstName / Value / SpiceLine)
    const slots = new Set([...Object.keys(asy.windows), ...Object.keys(sym.windows)]);
    for(const n of slots){
      const attr = WINDOW_ATTR[n]; if(!attr) continue;
      let val = sym.attrs[attr];
      if(val===undefined && attr==="Value") val = asy.value;
      if(val===undefined || val===null) continue;
      const w = sym.windows[n] || asy.windows[n];
      const [a,b] = xf.pt(w.x, w.y);
      let just = w.just;
      if(xf.mirror){ if(just==="Left") just="Right"; else if(just==="Right") just="Left"; }
      drawTextJust(val, sym.x+a, sym.y+b, just, w.size, C.comp);
    }
  }

  // floating pin markers
  ctx.strokeStyle = C.pin;
  for(const [x,y] of m.floatPins) ctx.strokeRect(x-3,y-3,6,6);

  // flags
  for(const f of sch.flags){
    if(f.net==="0"){
      ctx.strokeStyle = C.wire;
      ctx.beginPath();
      ctx.moveTo(f.x-12,f.y); ctx.lineTo(f.x+12,f.y);
      ctx.lineTo(f.x,f.y+12); ctx.closePath(); ctx.stroke();
    } else {
      drawTextJust(f.net, f.x, f.y-5, "Bottom", 1.6, C.flag);
    }
  }
  // iopins
  ctx.strokeStyle = C.flag;
  for(const p of sch.iopins) ctx.strokeRect(p.x-6,p.y-6,12,12);

  // schematic text
  for(const t of sch.texts){
    const isDirective = t.str.startsWith("!");
    const str = t.str.replace(/^[!;]/,"");
    drawTextJust(str, t.x, t.y, t.just, t.size, isDirective?C.directive:C.comment);
  }

  // net highlight overlay
  if(m.highlight){
    ctx.strokeStyle = C.hl; ctx.lineWidth = Math.max(3.5/view.scale, 1.6);
    ctx.beginPath();
    for(const [x1,y1,x2,y2] of sch.wires){
      if(m.netOf(x1,y1)===m.highlight){ ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); }
    }
    ctx.stroke();
    ctx.fillStyle = C.hl;
    for(const f of sch.flags){
      if(m.netOf(f.x,f.y)===m.highlight){ ctx.beginPath(); ctx.arc(f.x,f.y,4,0,7); ctx.fill(); }
    }
  }
}

/* ======================= interaction ======================= */
let drag=null;
cv.addEventListener("mousedown", e=>{
  drag={x:e.clientX,y:e.clientY,ox:view.ox,oy:view.oy,moved:false};
  cv.classList.add("panning");
});
window.addEventListener("mousemove", e=>{
  if(drag){
    const dx=e.clientX-drag.x, dy=e.clientY-drag.y;
    if(Math.abs(dx)+Math.abs(dy)>3) drag.moved=true;
    view.ox=drag.ox+dx; view.oy=drag.oy+dy; draw();
  } else tooltip(e);
});
window.addEventListener("mouseup", e=>{
  cv.classList.remove("panning");
  if(drag && !drag.moved) clickNet(e);
  drag=null;
});
cv.addEventListener("wheel", e=>{
  e.preventDefault();
  const f = Math.pow(1.0015, -e.deltaY);
  const r = cv.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  const wx=(mx-view.ox)/view.scale, wy=(my-view.oy)/view.scale;
  view.scale = Math.min(20, Math.max(0.01, view.scale*f));
  view.ox = mx-wx*view.scale; view.oy = my-wy*view.scale;
  draw();
},{passive:false});

function worldPos(e){
  const r = cv.getBoundingClientRect();
  return [(e.clientX-r.left-view.ox)/view.scale, (e.clientY-r.top-view.oy)/view.scale];
}
function distToSeg(px,py,x1,y1,x2,y2){
  const dx=x2-x1, dy=y2-y1, L2=dx*dx+dy*dy;
  let t = L2 ? ((px-x1)*dx+(py-y1)*dy)/L2 : 0;
  t = Math.max(0,Math.min(1,t));
  return Math.hypot(px-(x1+t*dx), py-(y1+t*dy));
}
function clickNet(e){
  if(!model) return;
  const [wx,wy] = worldPos(e);
  const tol = 7/view.scale;
  let best=null, bd=tol;
  for(const w of model.sch.wires){
    const d = distToSeg(wx,wy,w[0],w[1],w[2],w[3]);
    if(d<bd){ bd=d; best=w; }
  }
  const info = document.getElementById("netinfo");
  if(best){
    model.highlight = model.netOf(best[0],best[1]);
    const nm = model.netNames[model.highlight];
    info.textContent = "Net: " + (nm || "(unnamed)");
  } else { model.highlight=null; info.textContent=""; }
  draw();
}
const tip = document.getElementById("tip");
function tooltip(e){
  if(!model){ tip.style.display="none"; return; }
  const [wx,wy] = worldPos(e);
  let hit=null;
  for(const p of model.placed){
    if(wx>=p.bb[0]-4&&wx<=p.bb[2]+4&&wy>=p.bb[1]-4&&wy<=p.bb[3]+4){ hit=p; break; }
  }
  if(hit){
    const a = hit.sym.attrs;
    tip.innerHTML = `<b>${a.InstName||"?"}</b> &nbsp;<span style="opacity:.7">${hit.sym.name}</span>`
      + (a.Value?`<br>${a.Value}`:"") + (a.Value2?`<br>${a.Value2}`:"")
      + (a.SpiceLine?`<br><span style="opacity:.7">${a.SpiceLine}</span>`:"");
    const r = cv.getBoundingClientRect();
    tip.style.left = (e.clientX-r.left+14)+"px";
    tip.style.top  = (e.clientY-r.top+10)+"px";
    tip.style.display = "block";
  } else tip.style.display="none";
}

window.addEventListener("keydown", e=>{
  if(e.target.tagName==="INPUT") return;
  if(e.key==="f"||e.key==="F") fit();
  if(e.key==="g"||e.key==="G"){ showGrid=!showGrid; draw(); }
  if(e.key==="t"||e.key==="T") toggleTheme();
  if(e.key==="Escape" && model){ model.highlight=null; document.getElementById("netinfo").textContent=""; draw(); }
});
document.getElementById("fitBtn").onclick = fit;
document.getElementById("gridBtn").onclick = ()=>{ showGrid=!showGrid; draw(); };
function toggleTheme(){ document.body.classList.toggle("dark"); draw(); }
document.getElementById("themeBtn").onclick = toggleTheme;
document.getElementById("pngBtn").onclick = ()=>{
  const a=document.createElement("a");
  a.download=(model?model.fileLabel.replace(/\.\w+$/,""):"schematic")+".png";
  a.href=cv.toDataURL("image/png"); a.click();
};
new ResizeObserver(draw).observe(cv);

/* ======================= file loading ======================= */
async function loadFiles(files){
  let asc=null, ascName="";
  for(const f of files){
    const text = decodeBuf(await f.arrayBuffer());
    if(/\.asy$/i.test(f.name)){
      const base = f.name.replace(/\.asy$/i,"").toLowerCase();
      userLib[base] = parseAsy(text);
    } else { asc=text; ascName=f.name; }
  }
  if(asc) { buildModel(parseAsc(asc), ascName); fit(); }
  else if(model){ buildModel(model.sch, model.fileLabel); draw(); } // re-resolve symbols
  updateLibInfo();
}
function updateLibInfo(){
  const n = Object.keys(LIB).length, u = Object.keys(userLib).length;
  document.getElementById("libinfo").textContent =
    `${n} built-in symbols` + (u?` + ${u} user`:"");
}
document.getElementById("file").addEventListener("change", e=>loadFiles([...e.target.files]));
window.addEventListener("dragover", e=>{ e.preventDefault(); document.body.classList.add("dragging"); });
window.addEventListener("dragleave", e=>{ if(!e.relatedTarget) document.body.classList.remove("dragging"); });
window.addEventListener("drop", e=>{
  e.preventDefault(); document.body.classList.remove("dragging");
  loadFiles([...e.dataTransfer.files]);
});
updateLibInfo();
draw();
</script>
</body>
